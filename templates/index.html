<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareerCompass</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- Chat Card -->
  <div class="chat-card">

    <!-- Header -->
    <div class="chat-header">
      <div class="header-icon">
        <!-- Compass icon -->
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>CareerCompass</h1>
        <p>Navigate your future</p>
      </div>
      <div class="header-status">
        <div class="status-dot"></div>
        Online
      </div>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chat-messages">

      <!-- Welcome message -->
      <div class="message bot">
        <div class="avatar bot-avatar">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
          </svg>
        </div>
        <div class="bubble">
          Hi! I'm <strong>CareerCompass</strong> — your career services assistant.<br><br>
          Ask me about resumes, interviews, internships, job searching, networking, LinkedIn, salary negotiation, and more.
        </div>
      </div>

      <!-- Typing indicator (hidden by default) -->
      <div class="typing-indicator" id="typing-indicator">
        <div class="avatar bot-avatar">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
          </svg>
        </div>
        <div class="typing-bubble">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>

    </div>

    <!-- Input -->
    <div class="chat-input-area">
      <div class="input-row">
        <textarea
          id="user-input"
          rows="1"
          placeholder="Ask me anything about your career..."
        ></textarea>
        <button id="send-btn" aria-label="Send">
          <!-- Send arrow -->
          <svg viewBox="0 0 24 24">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <!-- Quick-start chips (below card) -->
  <div class="chips-row">
    <button class="chip" onclick="sendChip('How do I write a resume?')">
      <!-- Document icon -->
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Resume
    </button>
    <button class="chip" onclick="sendChip('How do I prepare for a job interview?')">
      <!-- Mic icon -->
      <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      Interview
    </button>
    <button class="chip" onclick="sendChip('How do I find an internship?')">
      <!-- Briefcase icon -->
      <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
      Internship
    </button>
    <button class="chip" onclick="sendChip('How do I optimize my LinkedIn profile?')">
      <!-- Link icon -->
      <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      LinkedIn
    </button>
    <button class="chip" onclick="sendChip('How do I negotiate my salary?')">
      <!-- Dollar icon -->
      <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      Salary
    </button>
    <button class="chip" onclick="sendChip('How do I start networking?')">
      <!-- Users icon -->
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Networking
    </button>
  </div>

  <!-- Footer -->
  <p class="page-footer">Powered by rule-based AI &amp; GPT-4o mini</p>

  <script>
    const messagesEl = document.getElementById('chat-messages');
    const inputEl    = document.getElementById('user-input');
    const sendBtn    = document.getElementById('send-btn');
    const typingEl   = document.getElementById('typing-indicator');

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + 'px';
    });

    // Enter to send, Shift+Enter for newline
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    function sendChip(text) {
      inputEl.value = text;
      sendMessage();
    }

    function appendMessage(role, text) {
      // Remove typing indicator before appending
      typingEl.classList.remove('visible');

      const wrapper = document.createElement('div');
      wrapper.className = `message ${role}`;

      const avatarSVG = `
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
        </svg>`;

      const userAvatarSVG = `
        <svg viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>`;

      if (role === 'bot') {
        wrapper.innerHTML = `
          <div class="avatar bot-avatar">${avatarSVG}</div>
          <div class="bubble">${escapeHtml(text)}</div>`;
      } else {
        wrapper.innerHTML = `
          <div class="avatar user-avatar">${userAvatarSVG}</div>
          <div class="bubble">${escapeHtml(text)}</div>`;
      }

      // Insert before typing indicator
      messagesEl.insertBefore(wrapper, typingEl);
      scrollToBottom();
    }

    function showTyping() {
      typingEl.classList.add('visible');
      scrollToBottom();
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      // Clear input
      inputEl.value = '';
      inputEl.style.height = 'auto';

      // Show user message
      appendMessage('user', text);

      // Show typing indicator
      showTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });
        const data = await res.json();
        appendMessage('bot', data.response);
      } catch {
        appendMessage('bot', 'Sorry, something went wrong. Please try again.');
      }
    }
  </script>

</body>
</html>
